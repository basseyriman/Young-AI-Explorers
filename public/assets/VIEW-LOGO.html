<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Young AI Explorers — Logo</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { margin: 0; font-family: Montserrat, system-ui, sans-serif; background: #f0eeeb; padding: 48px; }
    .lockup { display: inline-flex; flex-direction: column; align-items: stretch; background: #fff; padding: 18px 28px 16px; border-radius: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .row { display: flex; align-items: center; gap: 14px; }
    .mark { width: 40px; height: 36px; flex-shrink: 0; }
    .wordmark { display: flex; flex-direction: column; align-items: center; text-align: center; line-height: 1; padding-top: 1px; }
    .title { font-size: 17px; font-weight: 600; letter-spacing: -0.03em; color: #4A2D6E; }
    .sub { font-size: 9px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: #C9A04E; margin-top: 6px; }
    .tag { font-size: 8px; color: rgba(74,45,110,0.5); margin-top: 10px; padding-top: 2px; letter-spacing: 0.06em; text-align: center; width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="lockup">
    <div class="row">
      <img class="mark" src="logo-mark.svg" alt="" />
      <div class="wordmark">
        <div class="title">Young AI</div>
        <div class="sub">Explorers</div>
      </div>
    </div>
    <span class="tag">A Kid's Guide to the Future</span>
  </div>
</body>
</html>
